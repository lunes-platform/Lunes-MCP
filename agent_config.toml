# Lunes MCP Server configuration
#
# This file defines the agent operating mode, write permissions, spending
# limits, and HTTP server settings. The default configuration is intentionally
# safe: it can prepare payloads for review, but it cannot sign or spend.

[network]
# Primary Lunes Network WebSocket endpoint. Runtime validation accepts wss://
# endpoints, plus ws://127.0.0.1 or ws://localhost for local development.
# Credentials, query strings, and URL fragments are rejected.
rpc_url = "wss://ws.lunes.io"

# Fallback WebSocket endpoints.
rpc_failovers = [
    "wss://ws-lunes-main-01.lunes.io",
    "wss://ws-lunes-main-02.lunes.io"
]

# Archive endpoint for historical queries.
archive_url = "wss://ws-archive.lunes.io"

[agent.wallet]
# Available modes:
#   "prepare_only" - prepare unsigned payloads for external review.
#   "autonomous"   - sign locally after KMS policy checks.
#
# Autonomous mode requires explicit opt-in:
#   LUNES_MCP_ALLOW_AUTONOMOUS=1
mode = "prepare_only"

[agent.permissions]
# Extrinsics the agent may invoke. Empty means no write operation is allowed.
# Examples: "balances.transfer", "staking.bond", "staking.nominate".
# Externally signed relay requires "author.submit_extrinsic".
allowed_extrinsics = []

# Destination addresses, contracts, or policy targets the agent may write to.
# Staking workflows require "staking" plus every validator/reward address.
# Externally signed relay requires the "broadcast" policy target.
# Empty means no write destination is allowed.
whitelisted_addresses = []

# Maximum LUNES spend over a 24-hour window.
# Zero blocks autonomous spend and native transfer preparation.
daily_limit_lunes = 0

# Contract reads and write preparation require an explicit message allowlist.
# Empty method lists do not grant wildcard access.
# Example: { "6contract..." = ["PSP22::balance_of"] }
allowlist_contracts = {}

# Optional PSP22 metadata and transfer policy, keyed by contract address.
# PSP22 transfers require a contract/message allowlist plus this asset policy.
# Example:
# [agent.permissions.asset_policies."6contract..."]
# name = "Example Token"
# symbol = "EXT"
# decimals = 12
# max_transfer_base_units = "1000000000000"
# allowed_recipients = ["5recipient..."]

# Agent key lifetime in hours. Zero disables expiration.
ttl_hours = 168

[agent.permissions.governance]
# Governance is prepare-only. These fields only allow human-review payloads;
# final votes must be signed in an external wallet.
allow_prepare_votes = false
allowed_referenda = []
allowed_vote_directions = []
allowed_convictions = []
max_vote_lunes = 0

[server]
# Keep localhost by default. For containers, use 0.0.0.0 only with
# LUNES_MCP_API_KEY set to a strong random token.
bind_address = "127.0.0.1"
port = 9950
rate_limit_per_second = 10
rate_limit_burst = 20
